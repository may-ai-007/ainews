React性能）、Nisarg（中学开发YouTube歌词生成器赚数十万美金）、John（建筑系休学投身AI）。John分享编程启蒙源于高中神经网络实验，GPT-2发布后训练萨克斯伴奏模型，ChatGPT爆发后全职投入AI应用开发。\u003c/p\u003e\n\n\u003ch4\u003e▍创业历程与产品转型\u003c/h4\u003e\n\u003cul\u003e\n  \u003cli\u003e\u003cstrong\u003e技术探索期\u003c/strong\u003e：John开发建筑灵感收集器、自动浏览Agent等十余个项目，加入OpenAI前研究员团队研究数学证明AI\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e商业觉醒\u003c/strong\u003e：意识到研究型项目难盈利，转向解决企业实际需求，与Aiden/Nisarg合作优化React性能工具\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003eSame诞生\u003c/strong\u003e：2024年底从150个创意中选定\"让普通人开发赚钱产品\"方向，基于\"自动化复制工作流\"洞察，2.5个月上线产品\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch4\u003e▍产品架构与用户价值\u003c/h4\u003e\n\u003cul\u003e\n  \u003cli\u003e\u003cstrong\u003e技术核心\u003c/strong\u003e：多Agent协作系统（开发/运营/测试Agent），处理模糊业务需求\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e交互设计\u003c/strong\u003e：用户通过自然语言指令，Same自动生成代码、部署迭代\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e典型用户\u003c/strong\u003e：中小企业主（建营销网站）、个人开发者（快速验证MVP）\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e核心痛点\u003c/strong\u003e：降低开发门槛（原需1周的Wix建站现仅2-3小时）\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch4\u003e▍商业化与行业洞察\u003c/h4\u003e\n\u003cul\u003e\n  \u003cli\u003e\u003cstrong\u003e变现模式\u003c/strong\u003e：Token流量收费（当前300万美元ARR），长期规划用户盈利分成\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e竞争格局\u003c/strong\u003e：面向非开发者市场需差异化设计，Cursor等工具聚焦程序员效率提升\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e未来挑战\u003c/strong\u003e：技术月级迭代导致技能贬值，监管框架滞后，需建立用户信任机制\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch4\u003e▍创始人理念与愿景\u003c/h4\u003e\n\u003cul\u003e\n  \u003cli\u003e\u003cstrong\u003e工作哲学\u003c/strong\u003e：\"Just Work\"——快速迭代，敢于发布半成品收集用户反馈\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e团队文化\u003c/strong\u003e：偏爱动手能力强、具产品直觉的成员，拒绝过度设计\u003c/li\u003e\n  \u003cli\u003e\u003cstrong\u003e终极目标\u003c/strong\u003e：用户通过Same\"从Make web apps到Make money\"，Same从中分成\u003c/li\u003e\n\u003c/ul\u003e\n\n\n      \n      \u003cp\u003e\u003cb\u003e二、深度思考\u003c/b\u003e\n      \u003cb\u003e\n   \n      \u003cp\u003eSame.new案例揭示了AI工具演进的三个关键跃迁：从效率工具（如Cursor提升程序员产出）到创造平台（赋能非技术用户），最终指向经济系统（构建创作-盈利闭环）。其多Agent架构虽解决复杂任务协调难题，但面临两大悖论：技术民主化要求极简交互与底层系统复杂性间的矛盾，商业可持续性依赖规模化与个性化服务成本间的冲突。创始人\"半成品发布\"策略看似激进，实则契合AI时代\"训练数据即护城河\"的本质——用户反馈优化模型的效果远胜封闭开发。然而，当行业从技术竞赛转向生态竞争，Same需警惕工具属性被平台收编的风险（如抖音内置AI创作功能），应加速构建用户资产沉淀（如作品库/工作流复用），方能在\"AI泡沫期\"后持续创造价值。\u003c/p\u003e\n\n\n      \u003c/b\u003e\u003cp\u003e\n    "])</script><script>self.__next_f.push([1,"c:[\"id\",\"26\",\"d\"]\n"])</script><script>self.__next_f.push([1,"4:[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/ff1f652c3e50c789.css\",\"precedence\":\"next\",\"crossOrigin\":\"\"}]],[\"$\",\"$L5\",null,{\"buildId\":\"LmhqbK8HAriGKb0y2NOr2\",\"assetPrefix\":\"\",\"initialCanonicalUrl\":\"/news/26/\",\"initialTree\":[\"\",{\"children\":[\"news\",{\"children\":[[\"id\",\"26\",\"d\"],{\"children\":[\"__PAGE__?{\\\"id\\\":\\\"26\\\"}\",{}]}]}]},\"$undefined\",\"$undefined\",true],\"initialSeedData\":[\"\",{\"children\":[\"news\",{\"children\":[[\"id\",\"26\",\"d\"],{\"children\":[\"__PAGE__\",{},[\"$L6\",[\"$\",\"div\",null,{\"className\":\"min-h-screen flex flex-col bg-white dark:bg-gray-900\",\"children\":[[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"{\\\"@context\\\":\\\"https://schema.org\\\",\\\"@type\\\":\\\"NewsArticle\\\",\\\"headline\\\":\\\"专访 Same.new：三位 00 后以「网页复制」切入 AI 开发赛道，4 个月实现 300 万美金 ARR\\\",\\\"description\\\":\\\"【AI摘要】Same.new利用AI Agents帮助用户快速创建、部署web应用并商业化，上线4个月吸引50万用户，实现300万美元年度经常性收入。创始人分享了创业历程、技术架构和从’Make web apps‘到’Make money‘的愿景。\\\",\\\"image\\\":\\\"https://www.ainewsweekly.world/images/26.jpg\\\",\\\"datePublished\\\":\\\"2025-07-21\\\",\\\"author\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"AI News Weekly\\\"},\\\"publisher\\\":{\\\"@type\\\":\\\"Organization\\\",\\\"name\\\":\\\"AI News Weekly\\\",\\\"logo\\\":{\\\"@type\\\":\\\"ImageObject\\\",\\\"url\\\":\\\"https://www.ainewsweekly.world/icons/apple-touch-icon.png\\\"}},\\\"mainEntity
